<!DOCTYPE html>
<html lang="es" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de cotizaciones COTY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Sistema de cotizaciones COTY</h1>
            <button id="theme-toggle" aria-label="Cambiar modo oscuro/claro">
                <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5" />
                    <path
                        d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
                </svg>
                <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                </svg>
            </button>
        </header>

        <main>
            <form id="quote-form">
                <div class="form-group">
                    <label for="name">Nombre</label>
                    <input type="text" id="name" name="name" placeholder="Tu nombre completo" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="tu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="course-search">Buscar Cursos</label>
                    <div class="search-wrapper">
                        <input type="text" id="course-search" list="course-list"
                            placeholder="Escribe para buscar un curso...">
                        <datalist id="course-list">
                            <!-- Options will be populated by JS -->
                        </datalist>
                        <button type="button" id="add-course-btn">Agregar</button>
                    </div>
                </div>

                <div class="selected-courses-container">
                    <h3>Cursos Seleccionados</h3>
                    <div id="selected-list" class="empty-message-wrapper">
                        <p class="empty-message">No has seleccionado ningún curso aún.</p>
                    </div>
                </div>

                <div class="form-group">
                    <label>¿Desea aplicar descuento?</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="apply-discount" value="no" checked> No
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="apply-discount" value="si"> Sí
                        </label>
                    </div>
                </div>

                <div id="discount-container" class="form-group hidden">
                    <label for="discount-percentage">¿Cuanto desea aplicar %?</label>
                    <input type="number" id="discount-percentage" name="discount-percentage" placeholder="Ej: 10"
                        min="0">
                </div>

                <button type="submit" class="submit-btn">Cotizar</button>
            </form>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
